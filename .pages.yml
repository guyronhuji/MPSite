media:
  input: public/uploads
  output: /uploads
  rename: true

content:
  - name: pages_en
    label: Pages (English)
    type: collection
    path: src/content/pages/en
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: create
    subfolders: true
    view:
      layout: tree
      primary: title
      fields: [title, navTitle, showInNav, order]
      node:
        filename: index.md
    fields:
      - name: lang
        label: Language code
        type: string
        default: en
        required: true
      - name: path
        label: Path
        type: string
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: navTitle
        label: Navigation Title
        type: string
      - name: summary
        label: Summary
        type: text
      - name: showInNav
        label: Show in top navigation
        type: boolean
        default: true
      - name: order
        label: Order
        type: number
        default: 100
      - name: heroImage
        label: Hero image
        type: image
      - name: heroImageAlt
        label: Hero image alt text
        type: string
      - name: body
        label: Body
        type: rich-text
        options:
          media: uploads

