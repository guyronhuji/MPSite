media: public/uploads

content:
  - name: pages_en
    label: Pages (English)
    type: collection
    path: src/content/pages/en
    fields:
      - name: lang
        label: Language code
        type: string
        default: en
      - name: path
        label: Path
        type: string
      - name: title
        label: Title
        type: string
      - name: navTitle
        label: Navigation Title
        type: string
      - name: summary
        label: Summary
        type: text
      - name: showInNav
        label: Show in top navigation
        type: boolean
        default: true
      - name: order
        label: Order
        type: number
        default: 100
      - name: updatedAt
        label: Updated at (YYYY-MM-DD)
        type: string
      - name: body
        label: Body
        type: rich-text

